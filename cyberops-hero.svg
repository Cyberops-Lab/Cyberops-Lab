  <circle class="pulse" cx="600" cy="205" r="105" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
  <text x="600" y="360" text-anchor="middle" fill="#E2E8F0" font-size="48" class="title">CYBEROPS LAB</text>
